# .github/workflows/release.yml
#
# Build the Windows Inno Setup installer for AsciidocFX and attach it to a
# GitHub Release. Portable zip artifacts and macOS/Linux native installers
# have been removed — the Windows .exe installer (built with the free Inno
# Setup 6 toolchain) is now the sole release artifact.
#
# Triggers:
#   * push of a tag matching v*  -> builds + creates a release for that tag
#   * workflow_dispatch          -> manual trigger; enter the tag name in the UI

name: Release (Windows Inno Setup installer)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.0.0). Created if it doesn't exist."
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed by softprops/action-gh-release to create the release

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Mermaid CLI + Graphviz + 7-Zip + Inno Setup
        shell: pwsh
        run: |
          choco install graphviz 7zip innosetup --no-progress -y
          npm install -g '@mermaid-js/mermaid-cli'

      # Run setup with -SkipPrereqs to avoid re-installing the toolchain
      # (already provided above by setup-java / setup-node / choco). This step
      # downloads the JavaFX SDK and bundles a portable CRuby runtime into
      # ruby-runtime/windows/ so the appassembler payload picks it up and ships
      # the fast native-Ruby PDF render path.
      - name: Download JavaFX SDK + bundle CRuby runtime
        shell: pwsh
        run: pwsh -NoProfile -File scripts/setup.ps1 -SkipPrereqs -WithRuby

      - name: Build appassembler payload (Maven)
        shell: pwsh
        run: ./scripts/build.ps1 -SkipSetup -WithRuby

      # Hard gate: if Maven didn't copy ruby-runtime\windows\ into the
      # appassembler tree, fail the release before we waste time signing
      # an installer that's missing the fast PDF render path.
      - name: Verify bundled CRuby reached appassembler
        shell: pwsh
        run: |
          $ruby = "target/appassembler/ruby/bin/asciidoctor-pdf.bat"
          if (-not (Test-Path $ruby)) {
            Write-Host "::error::Bundled CRuby missing from appassembler tree ($ruby). Did setup.ps1 -WithRuby populate ruby-runtime/windows/?"
            Write-Host "::group::ruby-runtime/windows contents"
            if (Test-Path 'ruby-runtime/windows') { Get-ChildItem ruby-runtime/windows | Format-Table } else { Write-Host '<missing>' }
            Write-Host "::endgroup::"
            Write-Host "::group::target/appassembler contents"
            Get-ChildItem target/appassembler | Format-Table
            Write-Host "::endgroup::"
            exit 1
          }
          Write-Host "Bundled CRuby OK: $ruby"

      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: |
          ./scripts/internal/build_windows_installer.ps1 `
            -JavaHome "$env:JAVA_HOME" `
            -OutputDir "$PWD/target" `
            -RequireBundledRuby

      - name: Stage installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item target/AsciidocFX-*-Setup.exe staging/
          Copy-Item target/AsciidocFX-*-payload-manifest.txt staging/ -ErrorAction SilentlyContinue
          Get-ChildItem staging

      - uses: actions/upload-artifact@v4
        with:
          name: asciidocfx-windows-installer
          path: staging/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS / Linux installer jobs are intentionally disabled.
  #
  # When ready to ship cross-platform installers again:
  #   1. Restore scripts/internal/build_macos_installer.sh and
  #      scripts/internal/build_linux_installer.sh (see commit 528ac37d for
  #      the deleted versions, or a15766a4 for the original implementation).
  #   2. Uncomment the two job blocks below.
  #   3. Add the artifact globs to the `release` job's `files:` list:
  #        files: |
  #          dist/*.exe
  #          dist/*.dmg
  #          dist/*.deb
  #
  # build-macos:
  #   runs-on: macos-latest
  #   defaults: { run: { shell: bash } }
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-java@v4
  #       with: { java-version: '25', distribution: 'temurin', cache: maven }
  #     - uses: actions/setup-node@v4
  #       with: { node-version: 'lts/*' }
  #     - run: brew install graphviz ruby-build
  #     - run: npm install -g @mermaid-js/mermaid-cli
  #     - run: chmod +x scripts/*.sh scripts/internal/*.sh
  #     - run: ./scripts/setup.sh --skip-prereqs --with-ruby
  #     - run: ./scripts/build.sh --skip-setup --with-ruby
  #     - run: ./scripts/internal/build_macos_installer.sh --java-home "$JAVA_HOME" --output "$PWD/target"
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: asciidocfx-macos-installer
  #         path: target/AsciidocFX-*.dmg
  #         if-no-files-found: error
  #
  # build-linux:
  #   runs-on: ubuntu-latest
  #   defaults: { run: { shell: bash } }
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-java@v4
  #       with: { java-version: '25', distribution: 'temurin', cache: maven }
  #     - uses: actions/setup-node@v4
  #       with: { node-version: 'lts/*' }
  #     - run: |
  #         sudo apt-get update
  #         sudo apt-get install -y graphviz autoconf bison build-essential \
  #           libssl-dev libyaml-dev libreadline-dev zlib1g-dev libncurses-dev \
  #           libffi-dev libgdbm-dev
  #         git clone --depth 1 https://github.com/rbenv/ruby-build.git "$HOME/.rbenv/plugins/ruby-build"
  #     - run: npm install -g @mermaid-js/mermaid-cli
  #     - run: chmod +x scripts/*.sh scripts/internal/*.sh
  #     - run: ./scripts/setup.sh --skip-prereqs --with-ruby
  #     - run: ./scripts/build.sh --skip-setup --with-ruby
  #     - run: ./scripts/internal/build_linux_installer.sh --java-home "$JAVA_HOME" --output "$PWD/target"
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: asciidocfx-linux-installer
  #         path: target/asciidocfx_*.deb
  #         if-no-files-found: error
  # ---------------------------------------------------------------------------

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          awk '/^## /{a+=1} {if(a>1)exit} {if(a==1){print}}' CHANGELOG.md > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## SHA-256" >> RELEASE_NOTES.md
          echo "| File | SHA-256 |" >> RELEASE_NOTES.md
          echo "| --- | --- |" >> RELEASE_NOTES.md
          (cd dist && sha256sum *.exe) | awk '{print "| "$2" | "$1" |"}' >> RELEASE_NOTES.md

      - name: Resolve tag name
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: dist/*.exe

name: Unit tests

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Cancel any in-flight run for the same ref when a new commit lands.
concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

# Restrict the GITHUB_TOKEN to read-only.  The job only runs tests; it does
# not push commits, comment on PRs, or publish artifacts beyond a failure
# upload.  Locking permissions down also avoids the "waiting for runner"
# state some org policies trigger when a workflow asks for write scopes.
permissions:
  contents: read

jobs:
  test:
    # Pin the runner image instead of the floating `ubuntu-latest` label.
    # `ubuntu-latest` occasionally sits in the queue when GitHub flips its
    # alias mid-rollout; an explicit version always picks up immediately.
    runs-on: ubuntu-24.04
    # Hard cap so a stuck job fails loudly instead of consuming minutes.
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # JavaFX/TestFX integration tests (LoadingDotsAnimationTest,
      # PdfPreviewPaneZoomIntegrationTest, ProgressBarLifecycleTest,
      # PdfPreviewOutlineNavigationTest, EventServiceTest) need a real
      # display.  Install xvfb + the X libraries JavaFX's prism native
      # plugin links against, plus libgtk for the Glass toolkit.  This
      # is the minimal set; without these you get
      # "no glass in java.library.path" or
      # "Failed to load libprism_es2.so" at test startup.
      - name: Install JavaFX / xvfb runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libgl1 \
            libglu1-mesa \
            libgtk-3-0 \
            libpangoft2-1.0-0 \
            libxxf86vm1 \
            libxtst6 \
            libxslt1.1 \
            fonts-dejavu

      # Run the FULL test suite under xvfb so both the pure-Java tests
      # (PreviewSourceResolverTest etc.) and the TestFX-based GUI tests
      # (LoadingDotsAnimationTest, PdfPreviewPaneZoomIntegrationTest,
      # ProgressBarLifecycleTest, PdfPreviewOutlineNavigationTest,
      # EventServiceTest) are exercised on every CI run.  Without this
      # the GUI regressions caught by those tests slip through the
      # gate \u2014 e.g. the multi-thread loading-dots race
      # LoadingDotsAnimationTest.concurrentHoldsFromManyThreadsBalanceCorrectly
      # caught and fixed.
      #
      # Jacoco 0.8.7 (pinned in pom) cannot instrument JDK 25 class
      # files (Unsupported class file major version 69), so disable
      # coverage for this job; the test results above the JaCoCo
      # phase remain authoritative.
      - name: Run full test suite under xvfb
        run: >
          xvfb-run -a --server-args='-screen 0 1600x1200x24'
          mvn -B -ntp -DskipTests=false
          -DfailIfNoTests=true
          -Djacoco.skip=true
          test

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

name: Unit tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # The fork's unit tests target the new project-config / executable
      # resolution code, which has no JavaFX or display dependencies.
      # Restrict surefire to those classes so we don't pull in TestFX
      # (which needs a display) on a headless CI runner.
      # Jacoco 0.8.7 (pinned in pom) cannot instrument JDK 25 class files,
      # so disable it for this job — coverage isn't needed for these tests.
      - name: Run fork unit tests
        run: >
          mvn -B -ntp -DskipTests=false
          -Dtest='AsciidoctorConfigLoaderTest,ExecutableResolverTest,ProjectConfigDiscoveryTest'
          -DfailIfNoTests=true
          -Djacoco.skip=true
          test

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
